<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTZ Auto-Tracking Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1e;color:#ccc;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px;min-height:100vh}
h1{font-size:1.3em;color:#eee;margin-bottom:12px;letter-spacing:1px}
.wrap{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
canvas{border:1px solid #444;display:block;background:#000}
.panel{width:310px;max-height:580px;overflow-y:auto;background:#222;border:1px solid #444;border-radius:6px;padding:12px;font-size:12px}
.panel h2{font-size:13px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px;border-bottom:1px solid #333;padding-bottom:3px}
.panel h2:first-child{margin-top:0}
.ctrl-row{display:flex;align-items:center;margin:5px 0;gap:6px}
.ctrl-row label{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#bbb}
.ctrl-row input[type=range]{width:100px;accent-color:#5af}
.ctrl-row .val{width:42px;text-align:right;color:#8cf;font-family:monospace;font-size:11px}
.ctrl-row select{background:#333;color:#ccc;border:1px solid #555;border-radius:3px;padding:2px 4px;font-size:12px}
.btn-row{display:flex;gap:6px;margin:8px 0}
.btn-row button{flex:1;padding:5px 8px;background:#333;color:#ccc;border:1px solid #555;border-radius:3px;cursor:pointer;font-size:11px;transition:background .15s}
.btn-row button:hover{background:#444}
.btn-row button.active{background:#446;border-color:#68f}
</style>
</head>
<body>
<h1>PTZ Camera Auto-Tracking Demo</h1>
<div class="wrap">
<canvas id="cv" width="960" height="540"></canvas>
<div class="panel" id="panel"></div>
</div>

<script>
"use strict";

// ============================================================================
// CONFIG
// ============================================================================
var IMAGE_W = 960, IMAGE_H = 540, FPS = 30, DT = 1/FPS;
var PERSON_HEIGHT_RANGE = [1.6, 1.9];
var PERSON_SPEED_RANGE = [0.6, 1.6];
var WAYPOINT_REACHED_DIST = 0.4;
var CAMERA_NEAR = 0.2;
var PAN_INIT = 0.0;
var TILT_INIT = -18 * Math.PI / 180;
var DET_CONF_RANGE = [0.70, 0.98];
var DET_MIN_BBOX_PX = 8.0;
var DET_MIN_VISIBLE_FRAC = 0.35;
var TRK_IOU_THRESHOLD = 0.2;
var TRK_MAX_AGE = 15;
var TRK_MIN_HITS = 2;
var TRK_TRAIL_LEN = 40;
var TRK_MATCH_DIST_FACTOR = 1.5;
var CTRL_TARGET_LOST_GRACE = 30;

// BGR palette from Python (converted to RGB for Canvas)
var PALETTE = [
  [245,135,66],[90,200,60],[220,40,40],[40,160,200],
  [200,60,180],[200,200,40],[60,120,220],[200,80,120],
  [160,190,90],[140,90,200]
];

// ============================================================================
// PARAMS  (mirrors Python Params dataclass)
// ============================================================================
var params = {
  image_w: IMAGE_W, image_h: IMAGE_H, fps: FPS,
  num_people: 10,
  world_half: 8.0,
  speed_scale: 2.5,
  person_speed_min: PERSON_SPEED_RANGE[0],
  person_speed_max: PERSON_SPEED_RANGE[1],
  exclusion_radius: 3.0,
  camera_x: 0.0, camera_y: 0.0, camera_z: 2.6,
  fovy_deg: 50.0,
  pan_unlimited: true,
  pan_limit_deg: 170.0,
  tilt_limit_low_deg: -60.0,
  tilt_limit_high_deg: 25.0,
  det_noisy: true,
  det_bbox_jitter_px: 2.0,
  det_drop_prob: 0.05,
  trk_iou_threshold: TRK_IOU_THRESHOLD,
  trk_max_age: TRK_MAX_AGE,
  trk_min_hits: TRK_MIN_HITS,
  trk_trail_len: TRK_TRAIL_LEN,
  trk_match_dist_factor: TRK_MATCH_DIST_FACTOR,
  bbox_smoothing: 0.35,
  tracker_name: "SORT",
  trk_high_thresh: 0.6,
  trk_low_thresh: 0.1,
  trk_new_thresh: 0.7,
  trk_appearance_weight: 0.4,
  trk_appearance_gate: 0.35,
  trk_ocm_weight: 0.2,
  ctrl_smooth_time: 0.20,
  ctrl_max_speed_deg: 180.0,
  ctrl_engage_error: 0.15,
  ctrl_release_error: 0.04,
  ctrl_target_lost_grace: CTRL_TARGET_LOST_GRACE,
  ctrl_lead_frames: 8.0,
  get dt() { return 1.0 / this.fps; }
};

// ============================================================================
// SEEDED RNG (xoshiro128**)
// ============================================================================
function RNG(seed) {
  seed = seed | 0 || 1;
  this._s = new Uint32Array(4);
  this._s[0] = seed;
  this._s[1] = seed ^ 0x6C078965;
  this._s[2] = seed ^ 0x9908B0DF;
  this._s[3] = seed ^ 0x5BD1E995;
  for (var i = 0; i < 20; i++) this._next();
}
RNG.prototype._next = function() {
  var s = this._s;
  var result = Math.imul(s[1], 5);
  var r = ((result << 7) | (result >>> 25)) * 9;
  var t = s[1] << 9;
  s[2] ^= s[0]; s[3] ^= s[1]; s[1] ^= s[2]; s[0] ^= s[3];
  s[2] ^= t; s[3] = (s[3] << 11) | (s[3] >>> 21);
  return r >>> 0;
};
RNG.prototype.random = function() { return this._next() / 4294967296; };
RNG.prototype.uniform = function(lo, hi) { return lo + this.random() * (hi - lo); };
RNG.prototype.normal = function(mean, std) {
  var u, v, s2;
  do { u = 2*this.random()-1; v = 2*this.random()-1; s2 = u*u+v*v; } while (s2>=1||s2===0);
  return mean + std * u * Math.sqrt(-2 * Math.log(s2) / s2);
};

// ============================================================================
// WORLD
// ============================================================================
function randGround(rng, half, camXY, exclusion) {
  for (var i = 0; i < 64; i++) {
    var x = rng.uniform(-half, half), y = rng.uniform(-half, half);
    var dx = x - camXY[0], dy = y - camXY[1];
    if (Math.hypot(dx, dy) >= exclusion) return [x, y];
  }
  var x2 = rng.uniform(-half, half), y2 = rng.uniform(-half, half);
  var dx2 = x2 - camXY[0], dy2 = y2 - camXY[1];
  var n = Math.hypot(dx2, dy2) || 1;
  return [camXY[0] + dx2/n * exclusion, camXY[1] + dy2/n * exclusion];
}

function Person(pid, pos, height, speed, color) {
  this.pid = pid; this.pos = pos; this.height = height;
  this.speed = speed; this.color = color; this.waypoint = null;
}
Object.defineProperty(Person.prototype, "feet", { get: function() { return [this.pos[0], this.pos[1], 0]; } });
Object.defineProperty(Person.prototype, "head", { get: function() { return [this.pos[0], this.pos[1], this.height]; } });

function WorldSim(p, seed) {
  this.p = p;
  this.rng = new RNG(seed === undefined ? 0 : seed);
  var half = p.world_half;
  var camXY = [p.camera_x, p.camera_y];
  var excl = p.exclusion_radius;
  this.people = [];
  for (var i = 0; i < p.num_people; i++) {
    var speed = this.rng.uniform(p.person_speed_min, p.person_speed_max);
    var height = this.rng.uniform(PERSON_HEIGHT_RANGE[0], PERSON_HEIGHT_RANGE[1]);
    var person = new Person(i, randGround(this.rng, half, camXY, excl),
                               height, speed, PALETTE[i % PALETTE.length]);
    person.waypoint = randGround(this.rng, half, camXY, excl);
    this.people.push(person);
  }
}
WorldSim.prototype.step = function(dt) {
  if (dt === undefined) dt = this.p.dt;
  var half = this.p.world_half;
  var camXY = [this.p.camera_x, this.p.camera_y];
  var excl = this.p.exclusion_radius;
  for (var pi = 0; pi < this.people.length; pi++) {
    var p = this.people[pi];
    var dx = p.waypoint[0] - p.pos[0], dy = p.waypoint[1] - p.pos[1];
    var dist = Math.hypot(dx, dy);
    if (dist < WAYPOINT_REACHED_DIST) {
      p.waypoint = randGround(this.rng, half, camXY, excl);
      continue;
    }
    var dirx = dx/dist, diry = dy/dist;
    var stepDist = p.speed * this.p.speed_scale * dt;
    p.pos = [
      Math.max(-half, Math.min(half, p.pos[0] + dirx * stepDist)),
      Math.max(-half, Math.min(half, p.pos[1] + diry * stepDist))
    ];
    var ox = p.pos[0] - camXY[0], oy = p.pos[1] - camXY[1];
    var d = Math.hypot(ox, oy);
    if (d < excl) {
      var n = d || 1;
      p.pos = [camXY[0] + ox/n * excl, camXY[1] + oy/n * excl];
      p.waypoint = randGround(this.rng, half, camXY, excl);
    }
  }
};

// ============================================================================
// CAMERA
// ============================================================================
function Camera(p) {
  this.p = p;
  this.pos = [p.camera_x, p.camera_y, p.camera_z];
  this.pan = PAN_INIT;
  this.tilt = TILT_INIT;
  this.image_w = p.image_w;
  this.image_h = p.image_h;
  this.fovy = p.fovy_deg * Math.PI / 180;
  this.focal = (this.image_h / 2) / Math.tan(this.fovy / 2);
}
Object.defineProperty(Camera.prototype, "fovx", { get: function() { return 2*Math.atan((this.image_w/2)/this.focal); } });
Object.defineProperty(Camera.prototype, "frame_center", { get: function() { return [this.image_w/2, this.image_h/2]; } });
Camera.prototype._basis = function() {
  var p = this.pan, t = this.tilt;
  var cp = Math.cos(p), sp = Math.sin(p), ct = Math.cos(t), st = Math.sin(t);
  var forward = [sp*ct, cp*ct, st];
  var right = [cp, -sp, 0];
  var up = [
    right[1]*forward[2] - right[2]*forward[1],
    right[2]*forward[0] - right[0]*forward[2],
    right[0]*forward[1] - right[1]*forward[0]
  ];
  return { right: right, up: up, forward: forward };
};
Camera.prototype.clamp = function() {
  var tiltLow = this.p.tilt_limit_low_deg * Math.PI / 180;
  var tiltHigh = this.p.tilt_limit_high_deg * Math.PI / 180;
  this.tilt = Math.max(tiltLow, Math.min(tiltHigh, this.tilt));
  if (this.p.pan_unlimited) {
    // Wrap to [-pi, pi]
    this.pan = ((this.pan + Math.PI) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI) - Math.PI;
  } else {
    var panLim = this.p.pan_limit_deg * Math.PI / 180;
    this.pan = Math.max(-panLim, Math.min(panLim, this.pan));
  }
};
Camera.prototype.projectPoint = function(xyz) {
  var b = this._basis();
  var d0 = xyz[0]-this.pos[0], d1 = xyz[1]-this.pos[1], d2 = xyz[2]-this.pos[2];
  var zc = d0*b.forward[0] + d1*b.forward[1] + d2*b.forward[2];
  if (zc <= CAMERA_NEAR) return null;
  var xc = d0*b.right[0] + d1*b.right[1] + d2*b.right[2];
  var yc = d0*b.up[0] + d1*b.up[1] + d2*b.up[2];
  var u = this.image_w/2 + this.focal * (xc/zc);
  var v = this.image_h/2 - this.focal * (yc/zc);
  return [u, v, zc];
};
Camera.prototype.projectPerson = function(person) {
  var feet = this.projectPoint(person.feet);
  var head = this.projectPoint(person.head);
  if (!feet || !head) return null;
  var depth = 0.5*(feet[2]+head[2]);
  var u = 0.5*(feet[0]+head[0]);
  var halfW = 0.5 * (0.5 * this.focal / depth);
  var x1 = u-halfW, x2 = u+halfW;
  var y1 = Math.min(head[1],feet[1]), y2 = Math.max(head[1],feet[1]);
  var bw = x2-x1, bh = y2-y1;
  if (bh < DET_MIN_BBOX_PX) return null;
  var ix1c = Math.max(x1,0), iy1c = Math.max(y1,0);
  var ix2c = Math.min(x2,this.image_w), iy2c = Math.min(y2,this.image_h);
  var iw = Math.max(0,ix2c-ix1c), ih = Math.max(0,iy2c-iy1c);
  var area = bw * bh;
  var frac = area > 0 ? (iw*ih)/area : 0;
  if (frac < DET_MIN_VISIBLE_FRAC) return null;
  return { x1:x1, y1:y1, x2:x2, y2:y2, depth:depth, width:bw, height:bh,
           center: [0.5*(x1+x2), 0.5*(y1+y2)] };
};

function visiblePeople(camera, world) {
  var out = [];
  for (var i = 0; i < world.people.length; i++) {
    var p = world.people[i];
    var b = camera.projectPerson(p);
    if (b) out.push({ person: p, bbox: b });
  }
  out.sort(function(a,b) { return b.bbox.depth - a.bbox.depth; });
  return out;
}

// ============================================================================
// DETECTOR
// ============================================================================
function GroundTruthDetector(p, seed) {
  this.p = p;
  this.noisy = p.det_noisy;
  this.rng = new RNG(seed === undefined ? 1 : seed);
}
GroundTruthDetector.prototype.detect = function(camera, world) {
  var dets = [];
  var vp = visiblePeople(camera, world);
  for (var i = 0; i < vp.length; i++) {
    var person = vp[i].person, bbox = vp[i].bbox;
    if (this.noisy && this.rng.random() < this.p.det_drop_prob) continue;
    var x1 = bbox.x1, y1 = bbox.y1, x2 = bbox.x2, y2 = bbox.y2;
    if (this.noisy) {
      var j = this.p.det_bbox_jitter_px;
      x1 += this.rng.normal(0, j);
      y1 += this.rng.normal(0, j);
      x2 += this.rng.normal(0, j);
      y2 += this.rng.normal(0, j);
    }
    var conf = this.noisy ? this.rng.uniform(DET_CONF_RANGE[0], DET_CONF_RANGE[1]) : 0.99;
    dets.push({
      bbox: [x1,y1,x2,y2], confidence: conf,
      gt_pid: person.pid,
      get center() { return [0.5*(this.bbox[0]+this.bbox[2]), 0.5*(this.bbox[1]+this.bbox[3])]; }
    });
  }
  return dets;
};

// ============================================================================
// TRACKER BASE: Kalman, IoU, association, appearance
// ============================================================================
function bboxToZ(bbox) {
  var x1 = bbox[0], y1 = bbox[1], x2 = bbox[2], y2 = bbox[3];
  var w = Math.max(1e-3, x2-x1), h = Math.max(1e-3, y2-y1);
  return [x1+w/2, y1+h/2, w*h, w/h];
}
function xToBbox(x) {
  var cx = x[0], cy = x[1], s = Math.max(1e-3, x[2]), r = Math.max(1e-3, x[3]);
  var w = Math.sqrt(s*r);
  var h = w > 0 ? s/w : 0;
  return [cx-w/2, cy-h/2, cx+w/2, cy+h/2];
}

// Simple flat-array matrix operations
function matMul(A, B, ra, ca, cb) {
  var C = new Float64Array(ra * cb);
  for (var i=0;i<ra;i++) for (var j=0;j<cb;j++) {
    var s=0; for (var k=0;k<ca;k++) s += A[i*ca+k]*B[k*cb+j]; C[i*cb+j]=s;
  }
  return C;
}
function matAdd(A,B,n) { var C=new Float64Array(n); for(var i=0;i<n;i++) C[i]=A[i]+B[i]; return C; }
function matSub(A,B,n) { var C=new Float64Array(n); for(var i=0;i<n;i++) C[i]=A[i]-B[i]; return C; }
function matT(A,r,c) { var B=new Float64Array(r*c); for(var i=0;i<r;i++) for(var j=0;j<c;j++) B[j*r+i]=A[i*c+j]; return B; }
function eye(n) { var A=new Float64Array(n*n); for(var i=0;i<n;i++) A[i*n+i]=1; return A; }

function matInv4(M) {
  // 4x4 inverse via Gauss-Jordan elimination
  var aug = new Float64Array(4*8);
  for (var i=0;i<4;i++) {
    for (var j=0;j<4;j++) { aug[i*8+j]=M[i*4+j]; aug[i*8+4+j]=(i===j?1:0); }
  }
  for (var col=0;col<4;col++) {
    var maxRow=col, maxVal=Math.abs(aug[col*8+col]);
    for (var row=col+1;row<4;row++) {
      var v=Math.abs(aug[row*8+col]);
      if (v>maxVal){maxVal=v;maxRow=row;}
    }
    if (maxRow!==col) {
      for (var j2=0;j2<8;j2++) {var t=aug[col*8+j2];aug[col*8+j2]=aug[maxRow*8+j2];aug[maxRow*8+j2]=t;}
    }
    var piv=aug[col*8+col];
    if (Math.abs(piv)<1e-15) return eye(4);
    for (var j3=0;j3<8;j3++) aug[col*8+j3]/=piv;
    for (var row2=0;row2<4;row2++) {
      if (row2===col) continue;
      var f=aug[row2*8+col];
      for (var j4=0;j4<8;j4++) aug[row2*8+j4]-=f*aug[col*8+j4];
    }
  }
  var inv = new Float64Array(16);
  for (var i2=0;i2<4;i2++) for (var j5=0;j5<4;j5++) inv[i2*4+j5]=aug[i2*8+4+j5];
  return inv;
}

function KalmanBoxTracker(bbox, confidence, trackId, p, feature) {
  this.id = trackId;
  this.p = p;
  this._F = eye(7);
  for (var i=0;i<3;i++) this._F[i*7+(i+4)] = 1;
  this._H = new Float64Array(28);
  for (var i2=0;i2<4;i2++) this._H[i2*7+i2] = 1;
  this._P = eye(7);
  for (var i3=4;i3<7;i3++) this._P[i3*7+i3] *= 1000;
  for (var i4=0;i4<49;i4++) this._P[i4] *= 10;
  this._Q = eye(7);
  for (var i5=4;i5<7;i5++) this._Q[i5*7+i5] *= 0.01;
  this._Q[6*7+6] *= 0.01;
  this._R = eye(4);
  this._R[2*4+2] *= 10; this._R[3*4+3] *= 10;
  this._x = new Float64Array(7);
  var z = bboxToZ(bbox);
  for (var i6=0;i6<4;i6++) this._x[i6] = z[i6];
  this.confidence = confidence;
  this.hits = 1;
  this.age = 0;
  this.time_since_update = 0;
  this.confirmed = (p.trk_min_hits <= 1);
  this.trajectory = [this._getCenter()];
  this.feature = feature || null;
  this.last_observation = bbox.slice ? bbox.slice() : [bbox[0],bbox[1],bbox[2],bbox[3]];
  this._prev_center = this._getCenter();
}
KalmanBoxTracker.prototype._getBbox = function() { return xToBbox(this._x); };
Object.defineProperty(KalmanBoxTracker.prototype, "bbox", { get: function() { return this._getBbox(); } });
KalmanBoxTracker.prototype._getCenter = function() { var b=this._getBbox(); return [0.5*(b[0]+b[2]),0.5*(b[1]+b[3])]; };
Object.defineProperty(KalmanBoxTracker.prototype, "center", { get: function() { return this._getCenter(); } });
Object.defineProperty(KalmanBoxTracker.prototype, "velocity", { get: function() { return [this._x[4], this._x[5]]; } });
KalmanBoxTracker.prototype.predict = function() {
  if (this._x[2] + this._x[6] <= 0) this._x[6] = 0;
  this._x = matMul(this._F, this._x, 7, 7, 1);
  var FP = matMul(this._F, this._P, 7, 7, 7);
  var FT = matT(this._F, 7, 7);
  this._P = matAdd(matMul(FP, FT, 7, 7, 7), this._Q, 49);
  this.age++;
  this.time_since_update++;
  return this.bbox;
};
KalmanBoxTracker.prototype.update = function(bbox, confidence, feature) {
  var prev = this._getCenter();
  var z = bboxToZ(bbox);
  var Hx = matMul(this._H, this._x, 4, 7, 1);
  var y = new Float64Array(4);
  for (var i=0;i<4;i++) y[i] = z[i] - Hx[i];
  var HT = matT(this._H, 4, 7);
  var HP = matMul(this._H, this._P, 4, 7, 7);
  var S = matAdd(matMul(HP, HT, 4, 7, 4), this._R, 16);
  var Sinv = matInv4(S);
  var PHT = matMul(this._P, HT, 7, 7, 4);
  var K = matMul(PHT, Sinv, 7, 4, 4);
  var Ky = matMul(K, y, 7, 4, 1);
  for (var i2=0;i2<7;i2++) this._x[i2] += Ky[i2];
  var KH = matMul(K, this._H, 7, 4, 7);
  var IKH = matSub(eye(7), KH, 49);
  this._P = matMul(IKH, this._P, 7, 7, 7);
  this.hits++;
  this.time_since_update = 0;
  this.last_observation = bbox.slice ? bbox.slice() : [bbox[0],bbox[1],bbox[2],bbox[3]];
  if (confidence !== undefined) this.confidence = confidence;
  if (feature) this.feature = emaFeature(this.feature, feature, 0.9);
  if (this.hits >= this.p.trk_min_hits) this.confirmed = true;
  this.trajectory.push(this._getCenter());
  if (this.trajectory.length > this.p.trk_trail_len)
    this.trajectory = this.trajectory.slice(-this.p.trk_trail_len);
  this._prev_center = prev;
};
KalmanBoxTracker.prototype.toTrack = function() {
  var b = this.bbox;
  var c = [0.5*(b[0]+b[2]), 0.5*(b[1]+b[3])];
  return {
    track_id: this.id, bbox: b, confidence: this.confidence,
    trajectory: this.trajectory.slice(), hits: this.hits,
    time_since_update: this.time_since_update, confirmed: this.confirmed,
    velocity: [this._x[4], this._x[5]],
    center: c
  };
};

function emaFeature(old, nw, alpha) {
  if (!old) return nw;
  if (!nw) return old;
  var f = new Float64Array(old.length);
  for (var i=0;i<f.length;i++) f[i] = alpha*old[i] + (1-alpha)*nw[i];

var _frameImageData = null;

function rgbToHsv(r, g, b) {

  var x2 = Math.min(w, Math.floor(bbox[2])), y2 = Math.min(h, Math.floor(bbox[3]));

        if (iouVal < this.p.trk_iou_threshold) gated = true;
        if (this.tracks[ti].feature && features[dig] && appDist > this.p.trk_appearance_gate) gated = true;
        cost[ti][dil] = gated ? 1e5 : fused;
      }
    }
    var res = associate(cost, 1.0);
    var validM1 = [], amTrk = {}, amDet = {};
    for (i=0;i<res[0].length;i++) {
      var ti2=res[0][i][0], dl=res[0][i][1];
      if (cost[ti2][dl] < 1e5) { validM1.push([ti2,dl]); amTrk[ti2]=true; amDet[dl]=true; }
    }
    for (i=0;i<validM1.length;i++) {
      var dig2 = highDets[validM1[i][1]];
      this.tracks[validM1[i][0]].update(dets[dig2].bbox, dets[dig2].confidence, features[dig2]);
    }
    s1UnmatchedTrk = []; for (i=0;i<nt;i++) if(!amTrk[i]) s1UnmatchedTrk.push(i);
    unmatchedHighLocal = []; for (i=0;i<nd;i++) if(!amDet[i]) unmatchedHighLocal.push(i);
  } else {
    s1UnmatchedTrk = arrRange(this.tracks.length);
    unmatchedHighLocal = arrRange(highDets.length);
  }
  // Stage 2
  if (s1UnmatchedTrk.length && lowDets.length) {
    var remShifted = s1UnmatchedTrk.map(function(idx){return shiftedBoxes[idx];});
    var lowBoxes = lowDets.map(function(idx){return dets[idx].bbox;});
    var iouMat2 = iouBatch(remShifted, lowBoxes);
    var cost2 = iouMat2.map(function(r){return r.map(function(v){return 1-v;});});
    var res2 = associate(cost2, 0.5);
    for (i=0;i<res2[0].length;i++) {
      var realTi = s1UnmatchedTrk[res2[0][i][0]];
      var dig3 = lowDets[res2[0][i][1]];
      this.tracks[realTi].update(dets[dig3].bbox, dets[dig3].confidence, null);
    }
  }
  // distance fallback
  var fbTrks = fbTrkIndices(this.tracks);
  var leftoverGlobal = unmatchedHighLocal.map(function(dl){return highDets[dl];});
  var fb = distanceFallback(this.tracks, fbTrks, dets, leftoverGlobal, this.p);
  for (i=0;i<fb.length;i++) this.tracks[fb[i][0]].update(dets[fb[i][1]].bbox, dets[fb[i][1]].confidence, features[fb[i][1]]);
  var fbGlobal = setFromArr(fb.map(function(x){return x[1];}));
  unmatchedHighLocal = unmatchedHighLocal.filter(function(dl){return !fbGlobal[highDets[dl]];});
  // Spawn
  for (i=0;i<unmatchedHighLocal.length;i++) {
    var dl2 = unmatchedHighLocal[i];
    var dig4 = highDets[dl2];
    if (dets[dig4].confidence >= this.p.trk_new_thresh) {
      this.tracks.push(new KalmanBoxTracker(dets[dig4].bbox, dets[dig4].confidence, this._nextId++, this.p, features[dig4]));
    }
  }
  this.tracks = this.tracks.filter(function(t){return t.time_since_update <= this.p.trk_max_age;}.bind(this));
  if (camera) { this._prevPan = camera.pan; this._prevTilt = camera.tilt; }
  return this.tracks.map(function(t){return t.toTrack();});
};

var TRACKER_REGISTRY = {
  "SORT": SortTracker,
  "ByteTrack": ByteTrackTracker,
  "DeepSORT": DeepSortTracker,
  "OC-SORT": OcSortTracker,
  "BoT-SORT": BotSortTracker
};
function makeTracker(name, p) {
  var keys = Object.keys(TRACKER_REGISTRY);
  var key = null;
  for (var i=0;i<keys.length;i++) if(keys[i].toLowerCase()===name.toLowerCase()){key=keys[i];break;}
  if (!key) throw new Error("Unknown tracker: " + name);
  return new TRACKER_REGISTRY[key](p);
}

// ============================================================================
// CONTROLLER
// ============================================================================
function smoothDamp(current, target, velocity, smoothTime, maxSpeed, dt) {
  smoothTime = Math.max(1e-4, smoothTime);
  var omega = 2 / smoothTime;
  var x = omega * dt;
  var exp2 = 1 / (1 + x + 0.48*x*x + 0.235*x*x*x);
  var change = current - target;
  var originalTo = target;
  var maxChange = maxSpeed * smoothTime;
  change = Math.max(-maxChange, Math.min(maxChange, change));
  target = current - change;
  var temp = (velocity + omega * change) * dt;
  velocity = (velocity - omega * temp) * exp2;
  var nv = target + (change + temp) * exp2;
  if ((originalTo - current > 0) === (nv > originalTo)) {
    nv = originalTo;
    velocity = dt > 0 ? (nv - originalTo) / dt : 0;
  }
  return [nv, velocity];
}

function PTZController(p) {
  this.p = p;
  this._velPan = 0; this._velTilt = 0; this._engaged = false;
}
PTZController.prototype._pixelToWorldAngles = function(camera, u, v) {
  var fc = camera.frame_center;
  var focal = camera.focal;
  var xc = (u-fc[0])/focal, yc = (fc[1]-v)/focal;
  var b = camera._basis();
  var ray = [
    xc*b.right[0]+yc*b.up[0]+b.forward[0],
    xc*b.right[1]+yc*b.up[1]+b.forward[1],
    xc*b.right[2]+yc*b.up[2]+b.forward[2]
  ];
  var rn = Math.hypot(ray[0],ray[1],ray[2]);
  ray[0]/=rn; ray[1]/=rn; ray[2]/=rn;
  var pan_t = Math.atan2(ray[0], ray[1]);
  var tilt_t = Math.asin(Math.max(-1,Math.min(1,ray[2])));
  return [pan_t, tilt_t];
};
PTZController.prototype._idle = function(camera, dt, ex, ey, errorNorm) {
  ex = ex || 0; ey = ey || 0; errorNorm = errorNorm || 0;
  var maxSpeed = this.p.ctrl_max_speed_deg * Math.PI / 180;
  var pan0 = camera.pan, tilt0 = camera.tilt;
  var r = smoothDamp(camera.pan, camera.pan, this._velPan, this.p.ctrl_smooth_time, maxSpeed, dt);
  camera.pan = r[0]; this._velPan = r[1];
  r = smoothDamp(camera.tilt, camera.tilt, this._velTilt, this.p.ctrl_smooth_time, maxSpeed, dt);
  camera.tilt = r[0]; this._velTilt = r[1];
  camera.clamp();
  return {
    ex: ex, ey: ey, error_norm: errorNorm,
    centered: errorNorm <= this.p.ctrl_release_error,
    moved: camera.pan !== pan0 || camera.tilt !== tilt0,
    engaged: false,
    pan_delta_deg: (camera.pan-pan0)*180/Math.PI,
    tilt_delta_deg: (camera.tilt-tilt0)*180/Math.PI
  };
};
PTZController.prototype.update = function(camera, targetCenter, dt) {
  if (dt === undefined) dt = this.p.dt;
  if (!targetCenter) { this._engaged = false; return this._idle(camera, dt); }
  var u = targetCenter[0], v = targetCenter[1];
  var angles = this._pixelToWorldAngles(camera, u, v);
  var pan_t = angles[0], tilt_t = angles[1];
  var dpan = Math.atan2(Math.sin(pan_t-camera.pan), Math.cos(pan_t-camera.pan));
  var dtilt = tilt_t - camera.tilt;
  var ex = dpan / (camera.fovx / 2);
  var ey = dtilt / (camera.fovy / 2);
  var errorNorm = Math.hypot(ex, ey);
  if (!this._engaged && errorNorm > this.p.ctrl_engage_error) this._engaged = true;
  else if (this._engaged && errorNorm <= this.p.ctrl_release_error) this._engaged = false;
  if (!this._engaged) return this._idle(camera, dt, ex, ey, errorNorm);
  var maxSpeed = this.p.ctrl_max_speed_deg * Math.PI / 180;
  var pan0 = camera.pan, tilt0 = camera.tilt;
  var panGoal = camera.pan + dpan;
  var r = smoothDamp(camera.pan, panGoal, this._velPan, this.p.ctrl_smooth_time, maxSpeed, dt);
  var newPan = r[0]; this._velPan = r[1];
  r = smoothDamp(camera.tilt, tilt_t, this._velTilt, this.p.ctrl_smooth_time, maxSpeed, dt);
  var newTilt = r[0]; this._velTilt = r[1];
  camera.pan = newPan; camera.tilt = newTilt;
  camera.clamp();
  if (camera.pan !== newPan) this._velPan = 0;
  if (camera.tilt !== newTilt) this._velTilt = 0;
  return {
    ex: ex, ey: ey, error_norm: errorNorm,
    centered: errorNorm <= this.p.ctrl_release_error,
    moved: camera.pan !== pan0 || camera.tilt !== tilt0,
    engaged: true,
    pan_delta_deg: (camera.pan-pan0)*180/Math.PI,
    tilt_delta_deg: (camera.tilt-tilt0)*180/Math.PI
  };
};

// ============================================================================
// RENDERER (Canvas 2D)
// ============================================================================
var BG_WALL = "#23262D";
var BG_GROUND = "#30342B";
var GRID_COL = "#505550";
var EXCL_COL = "#DC5A46";
var COORD_CLAMP = 5000;

function clampCoord(v) { return Math.max(-COORD_CLAMP, Math.min(COORD_CLAMP, v)); }

function projectSegment(camera, p0, p1, nSamples) {
  nSamples = nSamples || 40;
  var pts = [];
  for (var i = 0; i <= nSamples; i++) {
    var t = i / nSamples;
    var wp = [p0[0]+t*(p1[0]-p0[0]), p0[1]+t*(p1[1]-p0[1]), p0[2]+t*(p1[2]-p0[2])];
    var r = camera.projectPoint(wp);
    if (!r) { pts.push(null); continue; }
    if (r[0] < -COORD_CLAMP || r[0] > camera.image_w+COORD_CLAMP || r[1] < -COORD_CLAMP || r[1] > camera.image_h+COORD_CLAMP) {
      pts.push(null); continue;
    }
    pts.push([clampCoord(r[0]), clampCoord(r[1])]);
  }
  return pts;
}

function drawPolySkipNulls(ctx, pts, color, lineWidth) {
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth || 1;
  var inSeg = false;
  ctx.beginPath();
  for (var i=0;i<pts.length;i++) {
    var pt = pts[i];
    if (!pt) { if (inSeg) { ctx.stroke(); ctx.beginPath(); inSeg = false; } continue; }
    if (!inSeg) { ctx.moveTo(pt[0], pt[1]); inSeg = true; }
    else ctx.lineTo(pt[0], pt[1]);
  }
  if (inSeg) ctx.stroke();
}

function horizonV(camera) {
  var r = camera.projectPoint([0, 1e6, 0]);
  if (!r) return camera.image_h / 2;
  return Math.max(0, Math.min(camera.image_h, Math.round(r[1])));
}

function renderScene(ctx, camera, world) {
  var W = camera.image_w, H = camera.image_h;
  var hv = horizonV(camera);
  ctx.fillStyle = BG_WALL;
  ctx.fillRect(0, 0, W, hv);
  ctx.fillStyle = BG_GROUND;
  ctx.fillRect(0, hv, W, H - hv);

  var half = camera.p.world_half;
  var steps = Math.floor(2 * half);
  for (var ix = 0; ix <= steps; ix++) {
    var x = -half + ix;
    drawPolySkipNulls(ctx, projectSegment(camera, [x,-half,0], [x,half,0]), GRID_COL);
  }
  for (var iy = 0; iy <= steps; iy++) {
    var y = -half + iy;
    drawPolySkipNulls(ctx, projectSegment(camera, [-half,y,0], [half,y,0]), GRID_COL);
  }

  var excR = camera.p.exclusion_radius;
  if (excR > 0) {
    var camXY = camera.pos;
    var ringPts = [];
    var n = 72;
    for (var i = 0; i <= n; i++) {
      var a = 2 * Math.PI * i / n;
      var wp = [camXY[0]+excR*Math.cos(a), camXY[1]+excR*Math.sin(a), 0];
      var r = camera.projectPoint(wp);
      if (!r) { ringPts.push(null); continue; }
      if (Math.abs(r[0])>2*COORD_CLAMP||Math.abs(r[1])>2*COORD_CLAMP) { ringPts.push(null); continue; }
      ringPts.push([clampCoord(r[0]), clampCoord(r[1])]);
    }
    drawPolySkipNulls(ctx, ringPts, EXCL_COL, 2);
  }

  var vp = visiblePeople(camera, world);
  for (var vi=0;vi<vp.length;vi++) drawPerson(ctx, vp[vi].person, vp[vi].bbox);
}

function rgbStr(c) { return "rgb("+c[0]+","+c[1]+","+c[2]+")"; }
function darkerStr(c, f) { f=f||0.45; return "rgb("+Math.floor(c[0]*f)+","+Math.floor(c[1]*f)+","+Math.floor(c[2]*f)+")"; }

function drawPerson(ctx, person, bbox) {
  var x1 = bbox.x1, y1 = bbox.y1, x2 = bbox.x2, y2 = bbox.y2;
  var bw = x2-x1, bh = y2-y1;
  if (bw < 3 || bh < 3) return;
  var cx = 0.5*(x1+x2);
  var color = person.color;
  var outline = darkerStr(color, 0.35);

  var headR = Math.max(2, bh * 0.12);
  var headCy = y1 + headR + bh * 0.01;
  var torsoTop = headCy + headR + bh * 0.02;
  var torsoBot = y1 + bh * 0.58;
  var torsoHw = bw * 0.46;
  var legHw = bw * 0.22;
  var legGap = bw * 0.04;

  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = "#1A1C16";
  ctx.beginPath();
  ctx.ellipse(cx, y2 + bh*0.03, Math.max(1,bw*0.48), Math.max(1,bh*0.04), 0, 0, 2*Math.PI);
  ctx.fill();
  ctx.restore();

  // Torso
  ctx.fillStyle = rgbStr(color);
  ctx.fillRect(cx - torsoHw, torsoTop, torsoHw*2, torsoBot - torsoTop);
  var shoulderR = torsoHw * 0.8;
  ctx.beginPath();
  ctx.ellipse(cx, torsoTop, Math.max(1,shoulderR), Math.max(1,shoulderR), 0, Math.PI, 2*Math.PI);
  ctx.fill();

  // Legs
  var llx1 = cx - legHw*2 - legGap, llx2 = cx - legGap;
  var rlx1 = cx + legGap, rlx2 = cx + legHw*2 + legGap;
  ctx.fillRect(llx1, torsoBot, llx2-llx1, y2-torsoBot);
  ctx.fillRect(rlx1, torsoBot, rlx2-rlx1, y2-torsoBot);

  // Head
  ctx.fillStyle = "rgb(210,160,100)";
  ctx.beginPath();
  ctx.arc(cx, headCy, Math.max(2,headR), 0, 2*Math.PI);
  ctx.fill();

  // Outlines
  var ot = Math.max(1, Math.round(bw * 0.04));
  ctx.strokeStyle = outline;
  ctx.lineWidth = ot;
  ctx.strokeRect(cx-torsoHw, torsoTop, torsoHw*2, torsoBot-torsoTop);
  ctx.strokeRect(llx1, torsoBot, llx2-llx1, y2-torsoBot);
  ctx.strokeRect(rlx1, torsoBot, rlx2-rlx1, y2-torsoBot);
  ctx.beginPath();
  ctx.arc(cx, headCy, Math.max(2,headR), 0, 2*Math.PI);
  ctx.stroke();
}

// ============================================================================
// OVERLAY
// ============================================================================
function drawOverlay(ctx, tracks, targetId, camera, status, state, fps, trackerName, latencyMs) {
  var W = camera.image_w, H = camera.image_h;
  var fc = camera.frame_center;
  var ccx = fc[0], ccy = fc[1];
  var targetTrack = null;
  for (var i=0;i<tracks.length;i++) if (tracks[i].track_id === targetId) { targetTrack = tracks[i]; break; }

  for (var ti=0;ti<tracks.length;ti++) {
    var trk = tracks[ti];
    var isTgt = trk.track_id === targetId;
    var bx1=trk.bbox[0], by1=trk.bbox[1], bx2=trk.bbox[2], by2=trk.bbox[3];
    var tcx=trk.center[0], tcy=trk.center[1];
    ctx.strokeStyle = isTgt ? "#FFDC00" : "rgba(80,200,80,0.9)";
    ctx.lineWidth = isTgt ? 3 : 1;
    ctx.strokeRect(bx1, by1, bx2-bx1, by2-by1);
    ctx.fillStyle = ctx.strokeStyle;
    ctx.beginPath();
    ctx.arc(tcx, tcy, isTgt?5:3, 0, 2*Math.PI);
    ctx.fill();
    var label = isTgt ? "TARGET ID"+trk.track_id+" "+trk.confidence.toFixed(2) : "ID"+trk.track_id+" "+trk.confidence.toFixed(2);
    ctx.font = isTgt ? "bold 11px monospace" : "10px monospace";
    var tw = ctx.measureText(label).width;
    var lx = Math.max(0, Math.min(W-tw-4, bx1));
    var ly = Math.max(12, by1-4);
    ctx.fillStyle = "rgba(20,20,20,0.75)";
    ctx.fillRect(lx-2, ly-11, tw+4, 14);
    ctx.fillStyle = isTgt ? "#FFDC00" : "rgba(80,200,80,0.9)";
    ctx.fillText(label, lx, ly);
  }

  for (var tj=0;tj<tracks.length;tj++) {
    var trk2 = tracks[tj];
    if (trk2.trajectory.length < 2) continue;
    var isTgt2 = trk2.track_id === targetId;
    ctx.strokeStyle = isTgt2 ? "rgba(240,190,0,0.7)" : "rgba(60,160,60,0.6)";
    ctx.lineWidth = isTgt2 ? 2 : 1;
    ctx.beginPath();
    ctx.moveTo(trk2.trajectory[0][0], trk2.trajectory[0][1]);
    for (var k=1;k<trk2.trajectory.length;k++) ctx.lineTo(trk2.trajectory[k][0], trk2.trajectory[k][1]);
    ctx.stroke();
  }

  // Crosshair
  ctx.strokeStyle = "rgba(220,220,220,0.8)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(ccx-10, ccy); ctx.lineTo(ccx+10, ccy);
  ctx.moveTo(ccx, ccy-10); ctx.lineTo(ccx, ccy+10);
  ctx.stroke();
  ctx.beginPath(); ctx.arc(ccx, ccy, 3, 0, 2*Math.PI); ctx.stroke();

  // Error vector
  if (targetTrack) {
    var etcx=targetTrack.center[0], etcy=targetTrack.center[1];
    ctx.strokeStyle = status.centered ? "rgba(60,220,60,0.8)" : "rgba(255,100,30,0.8)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ccx, ccy); ctx.lineTo(etcx, etcy);
    ctx.stroke();
    var adx = etcx-ccx, ady = etcy-ccy, alen = Math.hypot(adx,ady);
    if (alen > 10) {
      var aax = adx/alen, aay = ady/alen;
      var tipLen = Math.min(12, alen*0.15);
      var atx = etcx - aax*tipLen, aty = etcy - aay*tipLen;
      ctx.beginPath();
      ctx.moveTo(etcx, etcy);
      ctx.lineTo(atx - aay*4, aty + aax*4);
      ctx.lineTo(atx + aay*4, aty - aax*4);
      ctx.closePath();
      ctx.fillStyle = ctx.strokeStyle;
      ctx.fill();
    }
  }

  // HUD panel
  var hudLines = [];
  var lat = latencyMs !== undefined ? " ("+latencyMs.toFixed(2)+" ms)" : "";
  hudLines.push("TRACKER: "+(trackerName||"?") + lat);
  hudLines.push("STATE : "+state);
  hudLines.push("TARGET: "+(targetId !== null && targetId !== undefined ? targetId : "--"));
  hudLines.push("TRACKS: "+tracks.length);
  hudLines.push("PAN   : "+(camera.pan*180/Math.PI).toFixed(1)+"  TILT: "+(camera.tilt*180/Math.PI).toFixed(1));
  hudLines.push("ERR   : "+status.error_norm.toFixed(2)+"  "+(status.centered?"CENTERED":"ADJUSTING"));
  if (fps !== undefined) hudLines.push("FPS   : "+fps.toFixed(1));

  var lineH = 16, pad = 8;
  ctx.font = "11px monospace";
  var maxW = 0;
  for (var hi=0;hi<hudLines.length;hi++) { var m = ctx.measureText(hudLines[hi]).width; if (m > maxW) maxW = m; }
  var panelW = maxW + pad*2, panelH = hudLines.length * lineH + pad*2;
  ctx.fillStyle = "rgba(20,20,20,0.72)";
  ctx.fillRect(8, 8, panelW, panelH);
  ctx.strokeStyle = "rgba(100,100,100,0.8)";
  ctx.lineWidth = 1;
  ctx.strokeRect(8, 8, panelW, panelH);
  ctx.fillStyle = "#fff";
  for (var hi2=0;hi2<hudLines.length;hi2++) {
    ctx.fillText(hudLines[hi2], 8+pad, 8+pad+(hi2+1)*lineH-3);
  }
}

// ============================================================================
// DEMO (main loop orchestration)
// ============================================================================
function pickTarget(tracks) {
  var confirmed = [];
  for (var i=0;i<tracks.length;i++) if (tracks[i].confirmed) confirmed.push(tracks[i]);
  if (!confirmed.length) return null;
  var minId = confirmed[0].track_id;
  for (var j=1;j<confirmed.length;j++) if(confirmed[j].track_id < minId) minId=confirmed[j].track_id;
  return minId;
}
function findTrack(tracks, id) {
  if (id === null || id === undefined) return null;
  for (var i=0;i<tracks.length;i++) if (tracks[i].track_id === id) return tracks[i];
  return null;
}

function Demo(p, seed) {
  this.p = p;
  this.seed = seed || 0;
  this.world = new WorldSim(p, this.seed);
  this.camera = new Camera(p);
  this.detector = new GroundTruthDetector(p, this.seed + 1);
  this.tracker = makeTracker(p.tracker_name, p);
  this.controller = new PTZController(p);
  this.targetId = null;
  this.lostFrames = 0;
  this.paused = false;
  this.latencyMs = 0;
}
Demo.prototype.rebuildWorld = function() {
  this.world = new WorldSim(this.p, this.seed);
  this.targetId = null;
  this.lostFrames = 0;
};
Demo.prototype.setTracker = function(name) {
  this.p.tracker_name = name;
  this.tracker = makeTracker(name, this.p);
  this.targetId = null;
  this.lostFrames = 0;
  this.latencyMs = 0;
};
Demo.prototype.step = function(ctx, fps) {
  if (!this.paused) this.world.step();
  var dets = this.detector.detect(this.camera, this.world);
  // Render at detection pose FIRST
  renderScene(ctx, this.camera, this.world);
  // Grab pixel data for appearance trackers
  _frameImageData = ctx.getImageData(0, 0, this.camera.image_w, this.camera.image_h);
  // Time the tracker
  var t0 = performance.now();
  var tracks = this.tracker.update(dets, null, this.camera);
  var dtMs = performance.now() - t0;
  this.latencyMs = this.latencyMs ? 0.85 * this.latencyMs + 0.15 * dtMs : dtMs;
  // Target acquisition
  if (this.targetId === null) {
    this.targetId = pickTarget(tracks);
    this.lostFrames = 0;
  }
  var target = findTrack(tracks, this.targetId);
  var state, targetCenter, active;
  if (this.targetId === null) {
    state = "SEARCHING"; targetCenter = null; active = false;
  } else if (target) {
    active = true;
    this.lostFrames = target.time_since_update === 0 ? 0 : this.lostFrames + 1;
    var cx = target.center[0], cy = target.center[1];
    var vx = target.velocity[0], vy = target.velocity[1];
    var lead = this.p.ctrl_lead_frames;
    targetCenter = [cx + vx*lead, cy + vy*lead];
    state = target.time_since_update === 0 ? "TRACKING" : "COASTING";
  } else {
    active = false;
    this.lostFrames++;
    targetCenter = null;
    state = "TARGET LOST";
    if (this.lostFrames > this.p.ctrl_target_lost_grace) this.targetId = null;
  }
  var status = this.controller.update(this.camera, targetCenter);
  if (active && state !== "COASTING") {
    state = status.centered ? "CENTERED" : (status.engaged ? "TRACKING" : "IN RANGE");
  }
  drawOverlay(ctx, tracks, this.targetId, this.camera, status, state, fps, this.p.tracker_name, this.latencyMs);
  return { state: state, errorNorm: status.error_norm };
};

// ============================================================================
// CONTROL PANEL (HTML sliders, built via DOM API)
// ============================================================================
var SPECS = [
  ["People in scene",             "num_people",              1,   30, 1,    true],
  ["Walk speed (%)",              "speed_scale",             0, 1000, 0.01, false],
  ["Keep-out radius (m)",         "exclusion_radius",        0,   15, 1,    false],
  ["Scene half-size (m)",         "world_half",              4,   40, 1,    false],
  ["Camera ease time (1/100 s)",  "ctrl_smooth_time",        1,  100, 0.01, false],
  ["Max pan speed (deg/s)",       "ctrl_max_speed_deg",     30,  600, 1,    false],
  ["Aim lead (frames ahead)",     "ctrl_lead_frames",        0,   30, 1,    false],
  ["Start-follow error (%)",      "ctrl_engage_error",       1,  100, 0.01, false],
  ["Stop-follow error (%)",       "ctrl_release_error",      0,  100, 0.01, false],
  ["Re-acquire delay (frames)",   "ctrl_target_lost_grace",  0,  150, 1,    false],
  ["Box steadiness (1=raw)",      "bbox_smoothing",          5,  100, 0.01, false],
  ["Detection jitter (px)",       "det_bbox_jitter_px",      0,   12, 1,    false],
  ["Missed-detection (%)",        "det_drop_prob",           0,   50, 0.01, false],
];

function buildPanel(demo) {
  var panel = document.getElementById("panel");
  // Clear panel
  while (panel.firstChild) panel.removeChild(panel.firstChild);

  // -- Tracker section --
  var h2t = document.createElement("h2");
  h2t.textContent = "Tracker";
  panel.appendChild(h2t);

  var selRow = document.createElement("div");
  selRow.className = "ctrl-row";
  var selLabel = document.createElement("label");
  selLabel.textContent = "Algorithm";
  selRow.appendChild(selLabel);
  var sel = document.createElement("select");
  sel.id = "sel-tracker";
  for (var ni = 0; ni < TRACKER_NAMES.length; ni++) {
    var opt = document.createElement("option");
    opt.value = TRACKER_NAMES[ni];
    opt.textContent = TRACKER_NAMES[ni];
    if (TRACKER_NAMES[ni] === demo.p.tracker_name) opt.selected = true;
    sel.appendChild(opt);
  }
  selRow.appendChild(sel);
  panel.appendChild(selRow);

  // Buttons
  var btnRow = document.createElement("div");
  btnRow.className = "btn-row";
  var btnPause = document.createElement("button");
  btnPause.id = "btn-pause";
  btnPause.textContent = "Pause";
  btnRow.appendChild(btnPause);
  var btnRetarget = document.createElement("button");
  btnRetarget.id = "btn-retarget";
  btnRetarget.textContent = "Re-target";
  btnRow.appendChild(btnRetarget);
  var btnNoise = document.createElement("button");
  btnNoise.id = "btn-noise";
  btnNoise.className = "active";
  btnNoise.textContent = "Noise ON";
  btnRow.appendChild(btnNoise);
  panel.appendChild(btnRow);

  // Section builders
  var sections = [
    { title: "Scene", start: 0, end: 4 },
    { title: "Camera Follow", start: 4, end: 10 },
    { title: "Detection / Tracking", start: 10, end: SPECS.length }
  ];

  for (var si = 0; si < sections.length; si++) {
    var sec = sections[si];
    var h2 = document.createElement("h2");
    h2.textContent = sec.title;
    panel.appendChild(h2);
    for (var idx = sec.start; idx < sec.end; idx++) {
      var spec = SPECS[idx];
      var labelText = spec[0], attr = spec[1], mn = spec[2], mx = spec[3], scale = spec[4];
      var init = Math.round(demo.p[attr] / scale);
      var row = document.createElement("div");
      row.className = "ctrl-row";
      var lbl = document.createElement("label");
      lbl.textContent = labelText;
      lbl.title = attr;
      row.appendChild(lbl);
      var inp = document.createElement("input");
      inp.type = "range";
      inp.min = String(mn);
      inp.max = String(mx);
      inp.value = String(init);
      inp.dataset.attr = attr;
      inp.dataset.scale = String(scale);
      inp.dataset.structural = String(spec[5]);
      row.appendChild(inp);
      var valSpan = document.createElement("span");
      valSpan.className = "val";
      valSpan.textContent = String(init);
      row.appendChild(valSpan);
      panel.appendChild(row);
    }
  }

  // Event listeners
  sel.addEventListener("change", function() {
    demo.setTracker(this.value);
  });
  btnPause.addEventListener("click", function() {
    demo.paused = !demo.paused;
    this.textContent = demo.paused ? "Resume" : "Pause";
    this.classList.toggle("active", demo.paused);
  });
  btnRetarget.addEventListener("click", function() {
    demo.targetId = null; demo.lostFrames = 0;
  });
  btnNoise.addEventListener("click", function() {
    demo.detector.noisy = !demo.detector.noisy;
    this.textContent = demo.detector.noisy ? "Noise ON" : "Noise OFF";
    this.classList.toggle("active", demo.detector.noisy);
  });

  var prevPeople = demo.p.num_people;
  panel.addEventListener("input", function(e) {
    var inp2 = e.target;
    if (inp2.tagName !== "INPUT" || inp2.type !== "range") return;
    var attr2 = inp2.dataset.attr;
    var scale2 = parseFloat(inp2.dataset.scale);
    var raw = parseInt(inp2.value, 10);
    var value = raw * scale2;
    demo.p[attr2] = (scale2 === 1 && Number.isInteger(value)) ? Math.round(value) : value;
    inp2.nextElementSibling.textContent = String(raw);
    if (attr2 === "num_people" && demo.p.num_people !== prevPeople) {
      demo.rebuildWorld();
      prevPeople = demo.p.num_people;
    }
  });
}

// ============================================================================
// MAIN LOOP
// ============================================================================
var canvas = document.getElementById("cv");
var ctx = canvas.getContext("2d");
var demo = new Demo(params, 0);
buildPanel(demo);

var lastTime = performance.now();
var lastStep = performance.now();
var acc = 0;
var fpsVal = FPS;

// Fixed-timestep accumulator: advance the simulation at exactly FPS (30 Hz) of
// real time regardless of the display refresh rate, so motion matches the
// Python demo (one tracker/KF step per simulated frame). On a 60 Hz display
// this steps ~30x/s; if the tab falls behind, the catch-up is capped.
function loop(now) {
  var elapsed = (now - lastTime) / 1000;
  lastTime = now;
  acc += Math.min(elapsed, 0.25);
  while (acc >= DT) {
    acc -= DT;
    var sn = performance.now();
    var sdt = (sn - lastStep) / 1000;
    lastStep = sn;
    if (sdt > 0 && sdt < 1) fpsVal = 0.9 * fpsVal + 0.1 * (1 / sdt);
    demo.step(ctx, fpsVal);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

</script>
